name: CI/CD Pipeline for Laravel

on:
  push:
    branches: [ develop, uat, main, master ]
  pull_request:
    branches: [ develop, uat, main, master ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'

jobs:
  test-and-analyze:
    name: Test & Analyze Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd, bcmath, xdebug
          coverage: xdebug
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      # Установка зависимостей с обновлением lock файла
      - name: Install dependencies
        run: |
          # Удаляем старый lock файл, если есть
          rm -f composer.lock
          # Устанавливаем зависимости заново
          composer install --prefer-dist --no-interaction --no-progress
          # Обновляем lock файл
          composer update --lock

      - name: Copy CI environment file
        run: cp .env.ci .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Create database for testing
        run: mkdir -p database && touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      # Install development tools
      - name: Install development tools
        run: |
          composer require --dev phpstan/phpstan larastan/larastan laravel/pint --no-interaction --ignore-platform-req=ext-gd

      # Step a: Run Tests with Coverage
      - name: Run Tests with Coverage
        run: |
          php artisan test --coverage-text --min=50 || true

      # Step b: Static Analysis with PHPStan/Larastan
      - name: Run PHPStan Static Analysis
        run: |
          if [ -f "vendor/bin/phpstan" ]; then
            vendor/bin/phpstan analyse --memory-limit=2G app/ --error-format=github || true
          else
            echo "PHPStan not available"
          fi

      # Step c: Linting with Laravel Pint
      - name: Run Laravel Pint Linting
        run: |
          if [ -f "vendor/bin/pint" ]; then
            vendor/bin/pint --test || true
          else
            echo "Pint not available"
          fi

      # Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
