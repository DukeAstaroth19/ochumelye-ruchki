name: CI/CD Pipeline for Laravel

on:
  push:
    branches: [ develop, uat, main, master ]
  pull_request:
    branches: [ develop, uat, main, master ]
  workflow_dispatch:  # позволяет запускать вручную

env:
  PHP_VERSION: '8.2'

jobs:
  # Job 1: Тестирование и анализ кода
  test-and-analyze:
    name: Test & Analyze Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd, bcmath, xdebug
          coverage: xdebug
          tools: composer, phpstan, php-cs-fixer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy CI environment file
        run: cp .env.ci .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Create database for testing
        run: touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      # Step a: Run Tests with coverage
      - name: Run Tests with Coverage
        run: |
          php artisan test --coverage-clover coverage.xml --coverage-text --min=50
        continue-on-error: false

      # Step b: Static Analysis with PHPStan/Larastan
      - name: Run PHPStan Static Analysis
        run: |
          vendor/bin/phpstan analyse --memory-limit=2G --error-format=github || exit 1
        continue-on-error: false

      # Step c: Linting with Laravel Pint
      - name: Run Laravel Pint Linting
        run: |
          vendor/bin/pint --test --format=github
        continue-on-error: false

      # Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Create test summary
        run: |
          echo "## ✅ Тесты пройдены успешно!" >> $GITHUB_STEP_SUMMARY
          echo "📊 Покрытие кода проверено" >> $GITHUB_STEP_SUMMARY

  # Job 2: Deploy Simulation
  simulate-deploy:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Determine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Branch: $BRANCH"
          case "$BRANCH" in
            develop)
              echo "env_name=DEVELOPMENT" >> $GITHUB_OUTPUT
              echo "env_file=.env.dev" >> $GITHUB_OUTPUT
              echo "message=Deploying to DEVELOPMENT environment" >> $GITHUB_OUTPUT
              ;;
            uat)
              echo "env_name=UAT" >> $GITHUB_OUTPUT
              echo "env_file=.env.uat" >> $GITHUB_OUTPUT
              echo "message=Deploying to UAT environment" >> $GITHUB_OUTPUT
              ;;
            main|master)
              echo "env_name=PRODUCTION" >> $GITHUB_OUTPUT
              echo "env_file=.env.prod" >> $GITHUB_OUTPUT
              echo "message=Deploying to PRODUCTION environment" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "env_name=UNKNOWN" >> $GITHUB_OUTPUT
              echo "env_file=.env.ci" >> $GITHUB_OUTPUT
              echo "message=Unknown branch, using CI environment" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Copy environment file
        run: cp ${{ steps.env.outputs.env_file }} .env

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Generate application key
        run: php artisan key:generate

      - name: Simulate Deployment
        run: |
          echo "=========================================="
          echo "🚀 ${{ steps.env.outputs.message }}"
          echo "📁 Using configuration file: ${{ steps.env.outputs.env_file }}"
          echo "🌍 Environment: ${{ steps.env.outputs.env_name }}"
          echo "=========================================="
          echo "Current configuration:"
          cat .env | grep -E "APP_NAME|APP_ENV|APP_DEBUG|APP_URL|DB_CONNECTION"
          echo "=========================================="
          echo "✅ Deployment simulation completed successfully!"

  # Job 3: Production Deployment with Manual Approval
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: simulate-deploy
    if: (github.ref_name == 'main' || github.ref_name == 'master') && success()
    
    environment:
      name: production
      url: https://ochumelye-ruchki.ru
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Copy production environment
        run: cp .env.prod .env

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Optimize Laravel
        run: |
          php artisan optimize
          php artisan view:cache
          php artisan config:cache

      - name: Deploy to Production Server
        run: |
          echo "=========================================="
          echo "🎯 DEPLOYING TO PRODUCTION"
          echo "🔐 Manual approval required and completed"
          echo "✅ Production deployment successful!"
          echo "=========================================="

  # Bonus: Send notifications
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test-and-analyze, simulate-deploy]
    if: always()
    
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.test-and-analyze.result }}" == "success" && "${{ needs.simulate-deploy.result }}" == "success" ]]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "icon=🎉" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.test-and-analyze.result }}" == "failure" ]]; then
            echo "status=❌ FAILED - Tests" >> $GITHUB_OUTPUT
            echo "icon=💥" >> $GITHUB_OUTPUT
          else
            echo "status=⚠️ PARTIAL" >> $GITHUB_OUTPUT
            echo "icon=⚠️" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "# 🚀 CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test & Analyze | ${{ needs.test-and-analyze.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Simulate Deploy | ${{ needs.simulate-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
